name: Build Missing Wheels (Incremental)

on:
  workflow_dispatch:

jobs:
  download-missing:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Download pre-built wheels for missing packages
        run: |
          mkdir -p wheels
          pip install --upgrade pip

          # torchvision: needed by easyocr (was incorrectly removed from main build)
          # Use the version matching torch 2.1.0 in ascendai/pytorch base image
          pip download \
            --only-binary :all: \
            -d ./wheels/ \
            "torchvision==0.16.0"

          # spacy ecosystem: required by OpenNMT-py 2.2.0
          # All have pre-built manylinux aarch64 cp38 wheels on PyPI — no compilation needed
          pip download \
            --only-binary :all: \
            -d ./wheels/ \
            spacy \
            thinc \
            blis \
            murmurhash \
            cymem \
            preshed \
            srsly \
            catalogue \
            wasabi \
            typer \
            pathy \
            langcodes \
            "spacy-legacy>=3.0.11" \
            "spacy-loggers>=1.0.0" \
            confection

      - name: List downloaded wheels
        run: |
          echo "Total new wheels: $(ls wheels/ | wc -l)"
          ls -lh wheels/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: missing-arm64-cp38-wheels
          path: wheels/
          retention-days: 30
