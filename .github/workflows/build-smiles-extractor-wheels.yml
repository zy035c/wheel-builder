name: Build Smiles Extractor arm64 Wheels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheels inside Python 3.8 container
        run: |
          mkdir -p wheels
          docker run --rm \
            -v ${{ github.workspace }}/requirements.txt:/req.txt \
            -v ${{ github.workspace }}/wheels:/wheels \
            python:3.8-slim bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -q build-essential cmake libgl1 libglib2.0-0 libsm6 libxext6 git

              pip install --upgrade pip wheel

              # Pin numpy<2.0 (Python 3.8 max) and Cython<3.0 (spacy/blis .pyx compat)
              # --no-build-isolation reuses these instead of pulling newer build deps from PyPI
              pip install 'numpy>=1.24.0,<2.0' 'cython>=0.25,<3.0' setuptools wheel

              # --- Custom forks (not on PyPI) ---

              # Build MolScribe from CrystalEye42 fork (required by MolDetect/rxnscribe)
              git clone https://github.com/CrystalEye42/MolScribe.git /tmp/MolScribe
              git -C /tmp/MolScribe checkout 250f683
              pip wheel /tmp/MolScribe --no-build-isolation -w /wheels/

              # Build rxnscribe from Ozymandias314/MolDetect (contains MolDetect class)
              git clone https://github.com/Ozymandias314/MolDetect.git /tmp/RxnScribe
              sed -i \"/CrystalEye42\\/MolScribe/d\" /tmp/RxnScribe/requirements.txt
              sed -i \"/dependency_links/d\" /tmp/RxnScribe/setup.py
              pip wheel /tmp/RxnScribe --no-build-isolation -w /wheels/

              # --- OpenNMT-py: build without deps ---
              # spacy is listed as a dep of OpenNMT-py 2.2.0 but has no cp38 aarch64 wheel
              # and cannot be compiled. It is patched out of the wheel METADATA in the
              # Dockerfile, so we skip it here entirely.
              pip wheel 'OpenNMT-py>=2.2.0' --no-build-isolation --no-deps -w /wheels/

              # --- All remaining packages ---
              # Exclude molscribe, rxnscribe (built above) and OpenNMT-py (built above)
              grep -v -E '^(molscribe|rxnscribe|OpenNMT)' /req.txt > /tmp/req_rest.txt
              pip wheel -r /tmp/req_rest.txt --no-build-isolation -w /wheels/

              # --- torchvision ---
              # Must be downloaded here (inside Python 3.8 container) so pip selects the
              # cp38 aarch64 wheel. Downloading on the runner (Python 3.11+) would give
              # the wrong ABI and fail at import time inside the container.
              # Version 0.16.0 matches torch 2.1.0 in the ascendai/pytorch base image.
              pip download --only-binary :all: 'torchvision==0.16.0' -d /wheels/

              # Remove torch/torchaudio — already provided by ascendai/pytorch base image.
              # Keep torchvision — needed by easyocr and NOT in the base image.
              rm -fv /wheels/torch-*.whl /wheels/torchaudio-*.whl
            "

      - name: Scan wheels for embedded git URL dependencies
        run: |
          echo "=== Scanning all wheels for git URL dependencies ==="
          found=0
          for whl in wheels/*.whl; do
            gitdeps=$(python3 -c "
          import zipfile, sys
          z = zipfile.ZipFile('$whl')
          meta_files = [f for f in z.namelist() if f.endswith('/METADATA') or f == 'METADATA']
          if meta_files:
              content = z.read(meta_files[0]).decode('utf-8', errors='ignore')
              for line in content.splitlines():
                  if 'git+' in line:
                      print(line)
          " 2>/dev/null)
            if [ -n "$gitdeps" ]; then
              echo "WARNING: $(basename $whl):"
              echo "$gitdeps"
              found=1
            fi
          done
          if [ $found -eq 0 ]; then
            echo "All wheels clean — no git URL dependencies found."
          fi

      - name: List built wheels
        run: |
          echo "Total wheels: $(ls wheels/ | wc -l)"
          ls -lh wheels/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smiles-extractor-arm64-cp38-wheels
          path: wheels/
          retention-days: 30
