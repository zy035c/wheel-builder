name: Build arm64 Python 3.8 Wheels

on:
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build wheels inside Python 3.8 container
        run: |
          mkdir -p wheels
          docker run --rm \
            -v ${{ github.workspace }}/requirements.txt:/req.txt \
            -v ${{ github.workspace }}/wheels:/wheels \
            python:3.8-slim bash -c "
              set -e
              apt-get update -qq
              apt-get install -y -q build-essential cmake libgl1 libglib2.0-0 libsm6 libxext6 git

              pip install --upgrade pip wheel

              # Pre-install all common build tools with numpy 1.x and Cython 0.29.x pinned.
              # - numpy 2.x dropped Python 3.8 support
              # - Cython 3.x has breaking API changes that break spacy/blis .pyx compilation
              # --no-build-isolation makes all source builds reuse these instead of
              # pulling their own build deps from PyPI.
              pip install 'numpy>=1.24.0,<2.0' 'cython>=0.25,<3.0' setuptools wheel

              # Build MolScribe from CrystalEye42 fork (required by MolDetect)
              git clone https://github.com/CrystalEye42/MolScribe.git /tmp/MolScribe
              git -C /tmp/MolScribe checkout 250f683
              pip wheel /tmp/MolScribe --no-build-isolation -w /wheels/

              # Clone MolDetect fork and remove MolScribe git URL (already built above)
              git clone https://github.com/Ozymandias314/MolDetect.git /tmp/RxnScribe
              sed -i \"/CrystalEye42\\/MolScribe/d\" /tmp/RxnScribe/requirements.txt
              sed -i \"/dependency_links/d\" /tmp/RxnScribe/setup.py
              pip wheel /tmp/RxnScribe --no-build-isolation -w /wheels/

              # Build all remaining packages with --no-build-isolation
              grep -v -E '^(molscribe|rxnscribe)' /req.txt > /tmp/req_rest.txt
              pip wheel -r /tmp/req_rest.txt --no-build-isolation -w /wheels/

              echo '--- removing torch/torchaudio (provided by ascendai/pytorch base image) ---'
              echo '--- keeping torchvision: needed by easyocr, not in base image ---'
              rm -fv /wheels/torch-*.whl /wheels/torchaudio-*.whl
            "

      - name: Scan wheels for git URL dependencies
        run: |
          echo "=== Scanning all wheels for embedded git URL dependencies ==="
          found=0
          for whl in wheels/*.whl; do
            gitdeps=$(python3 -c "
          import zipfile, sys
          z = zipfile.ZipFile('$whl')
          meta_files = [f for f in z.namelist() if f.endswith('/METADATA') or f == 'METADATA']
          if meta_files:
              content = z.read(meta_files[0]).decode('utf-8', errors='ignore')
              for line in content.splitlines():
                  if 'git+' in line:
                      print(line)
          " 2>/dev/null)
            if [ -n "$gitdeps" ]; then
              echo "WARNING $(basename $whl):"
              echo "$gitdeps"
              found=1
            fi
          done
          if [ $found -eq 0 ]; then
            echo "All wheels clean - no git URL dependencies found."
          fi

      - name: List built wheels
        run: |
          echo "Total wheels: $(ls wheels/ | wc -l)"
          ls -lh wheels/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smiles-extractor-arm64-cp38-wheels
          path: wheels/
          retention-days: 30
